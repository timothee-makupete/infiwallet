# docker-compose.prod.yml

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: fintech_platform
      POSTGRES_USER: fintech_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech-network

  redis:
    image: redis:7-alpine
    networks:
      - fintech-network

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - fintech-network

  api-gateway:
    build: ./services/api-gateway
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/fintech_platform?schema=api_gateway
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3018:3018"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - fintech-network

  user-service:
    build: ./services/user-service
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/fintech_platform?schema=user_management
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - fintech-network

  wallet-service:
    build: ./services/wallet-service
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/fintech_platform?schema=wallet
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - fintech-network

  kyc-service:
    build: ./services/kyc-service
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/fintech_platform?schema=kyc
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - fintech-network

  web-user:
    build: ./apps/web-user
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:3018
    ports:
      - "3018:3018"
    depends_on:
      - api-gateway
    networks:
      - fintech-network

  web-admin:
    build: ./apps/web-admin
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:3018
    ports:
      - "3002:3018"
    depends_on:
      - api-gateway
    networks:
      - fintech-network

volumes:
  postgres_data:

networks:
  fintech-network:
    driver: bridge