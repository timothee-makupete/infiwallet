services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: infiwallet
      POSTGRES_USER: infiwallet
      POSTGRES_PASSWORD: infiwallet_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infiwallet -d infiwallet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: infiwallet
      RABBITMQ_DEFAULT_PASS: infiwallet_dev

  # Adminer - Database Management UI
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pg_data: