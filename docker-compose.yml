# docker-compose.prod.yml

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: infiwallet
      POSTGRES_USER: infiwallet
      POSTGRES_PASSWORD: infiwallet_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fintech-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - fintech-network

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: infiwallet
      RABBITMQ_DEFAULT_PASS: infiwallet_dev
    ports:
      - "5672:5672"
    networks:
      - fintech-network

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/fintech_platform?schema=api_gateway
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3018:3018"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - fintech-network

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/fintech_platform?schema=user_management
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - fintech-network

  wallet-service:
    build:
      context: .
      dockerfile: services/wallet-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/fintech_platform?schema=wallet
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - fintech-network

  kyc-service:
    build:
      context: .
      dockerfile: services/kyc-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/fintech_platform?schema=kyc
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - fintech-network

  web-user:
    build:
      context: .
      dockerfile: apps/web-user/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:3018
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - fintech-network

  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:3018
    ports:
      - "3010:3010"
    depends_on:
      - api-gateway
    networks:
      - fintech-network

volumes:
  postgres_data:

networks:
  fintech-network:
    driver: bridge